<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#0a2918"/>
    </linearGradient>
    <linearGradient id="flag" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Cup/hole at base -->
  <ellipse cx="200" cy="420" rx="90" ry="14" fill="#0a2918"/>
  <ellipse cx="200" cy="416" rx="90" ry="10" fill="#000000" opacity="0.6"/>

  <!-- Pole -->
  <rect x="194" y="100" width="12" height="320" rx="6" fill="#f8fafc"/>
  <rect x="194" y="100" width="12" height="320" rx="6" fill="url(#bg)" opacity="0.18"/>

  <!-- Flag -->
  <path d="M 206 100 L 410 150 L 206 200 Z" fill="url(#flag)"/>

  <!-- Pole tip ball -->
  <circle cx="200" cy="100" r="14" fill="#fbbf24"/>
</svg>
